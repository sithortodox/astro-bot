# Astralis — Мир колоды

concept: "Astralis — это космическое пространство, где звёзды являются живыми сущностями, а судьба человека определяется потоками звёздной энергии."

mythology:
  origin: "В начале был хаос — бесконечная пустота без формы и времени. Из хаоса родилось первое Светило — Аеон, звезда-творец."
  aeon: "Аеон рассёк пустоту четырьмя лучами, создав Потоки Реальности."

streams:
  fire:
    name: "Поток Огня (Жезлы)"
    description: "Поток Созидания и Действия"
    colors: ["алый", "золотой"]
    element: "огонь, воля, страсть"
    star: "Игнис — Звезда-Пламя"

  water:
    name: "Поток Воды (Кубки)"
    description: "Поток Чувств и Связей"
    colors: ["лазурный", "серебристый"]
    element: "вода, эмоции, интуиция"
    star: "Лунар — Звезда-Отражение"

  air:
    name: "Поток Воздуха (Мечи)"
    description: "Поток Разума и Истины"
    colors: ["белый", "голубой"]
    element: "воздух, мысли,沟通"
    star: "Зефир — Звезда-Ветер"

  earth:
    name: "Поток Земли (Пентакли)"
    description: "Поток Материи и Ресурсов"
    colors: ["зелёный", "коричневый"]
    element: "земля, тело, изобилие"
    star: "Терра — Звезда-Плодородие"

philosophy:
  - "Каждый человек — звезда в теле."
  - "Судьба — не фатум, а направление потока."
  - "Выбор определяет траекторию."
  - "Тень — не враг, а часть света."
  - "Рост возможен только через преодоление."

colors:
  fire: ["#FF4500", "#FFD700"]
  water: ["#1E90FF", "#C0C0C0"]
  air: ["#FFFFFF", "#87CEEB"]
  earth: ["#228B22", "#8B4513"]
  shadow: ["#2F1B41", "#1A0A2E"]
  light: ["#FFF8DC", "#FFFACD"]
