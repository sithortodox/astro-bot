# ===========================
# СВЯЗИ МЕЖДУ КАРТАМИ
# ===========================
relations:
  # Стихии усиливают/ослабляют друг друга
  elemental:
    fire_weakens: ["water", "earth"]      # Огонь ослабляется Водой и Землёй
    water_weakens: ["fire", "air"]         # Вода ослабляется Огнём и Воздухом
    air_weakens: ["earth", "fire"]         # Воздух ослабляется Землёй и Огнём
    earth_weakens: ["water", "air"]        # Земля ослабляется Водой и Воздухом

    fire_strengthens: ["air"]              # Огонь усиливается Воздухом
    water_strengthens: ["earth"]           # Вода усиливается Землёй
    air_strengthens: ["fire"]              # Воздух усиливается Огнём
    earth_strengthens: ["water"]           # Земля усиливается Водой
