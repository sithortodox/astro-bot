light_meaning: Ваша эмоциональная сфера находится в гармонии. Вы способны к глубоким
  связям и дипломатии.
shadow_meaning: Избегайте излишней зависимости от эмоций окружающих, чтобы не потерять
  свою индивидуальность.
love: Вы умеете создавать тёплую атмосферу в отношениях. Будьте внимательны к чувствам
  партнёра.
career: Ваше умение ладить с людьми помогает вам в карьере. Используйте это качество
  с умом.
money: Финансовая стабильность зависит от вашего умения управлять эмоциями и ресурсами.
health: Здоровье улучшается благодаря балансу между эмоциями и физической активностью.
spirituality: Слушайте своё сердце и следуйте за внутренними ощущениями.
advice: Используйте свои навыки общения, чтобы создать гармонию вокруг себя.
warning: Не позволяйте своим эмоциям взять верх над рациональными решениями.
symbols:
- Чаша с переливающейся жидкостью символизирует эмоции и связи.
- Рыба как символ воды и глубинных чувств.
- Коронованный монарх с атрибутами власти и мудрости.
