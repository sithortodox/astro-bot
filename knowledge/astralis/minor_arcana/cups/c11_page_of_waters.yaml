light_meaning: Молодой человек с мечтательными глазами и сосудом воды в руках символизирует
  нежность и чувствительность.
shadow_meaning: Перевернутая карта может указывать на чрезмерную зависимость от эмоций
  и неспособность принимать решения самостоятельно.
love: В отношениях карта говорит о необходимости проявлять заботу и понимание к партнёру.
career: На работе указывает на необходимость прислушиваться к своим чувствам и интуиции.
money: Финансовая сфера предупреждает о возможной растрате ресурсов из-за эмоциональных
  импульсов.
health: Карта советует уделять больше внимания своему эмоциональному состоянию и поддерживать
  его равновесие.
spirituality: Указывает на важность гармонии души и сердца при духовном поиске.
advice: Следите за своими эмоциями и не принимайте поспешных решений под их влиянием.
warning: Избегайте ситуаций, которые могут привести к эмоциональной перегрузке и истощению.
symbols:
- Мальчик с мечтательным взглядом
- Сосуд с водой
- Звезда на фоне звёздного неба
