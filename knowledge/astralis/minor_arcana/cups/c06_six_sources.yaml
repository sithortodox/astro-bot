light_meaning: Гармония прошлого и настоящего, чистота чувств и интуитивное понимание.
shadow_meaning: Удерживание прошлого, избегание новых переживаний, застой эмоций.
love: Восстановление утраченной эмоциональной связи, возвращение тепла воспоминаний.
career: Поиск внутреннего покоя через баланс работы и личной жизни, интуиция ведет
  к успеху.
money: Финансовая стабильность через чуткое отношение к своим ресурсам.
health: Эмоциональная регенерация, забота о душевном здоровье через воспоминания детства.
spirituality: Возвращение к духовному источнику через связь с детскими мечтами и идеалами.
advice: Открой сердце прошлым радостям, чтобы обрести покой здесь и сейчас.
warning: Не позволяй прошлому затмевать настоящее, иначе рискуешь остаться в прошлом
  навсегда.
symbols:
- Три женщины, держащие чашу с водой, символизируют источники эмоций и памяти.
- Звездочка внутри чаши символизирует чистоту и ясность интуиции.
- Солнце за горизонтом напоминает о свете прошлого.
