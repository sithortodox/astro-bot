light_meaning: Погружение в мир мечтаний и фантазий, необходимость сделать важный
  выбор.
shadow_meaning: Убегание от реальности через иллюзии и фантазии, избегание ответственности
  за выбор.
love: Влюблённость в мечты о любви вместо реальной близости партнёра.
career: Иллюзии о карьерном росте мешают объективно оценивать возможности.
money: Потеря денег из-за иллюзий о лёгких доходах.
health: Игнорирование реальных проблем со здоровьем ради фантазий о выздоровлении.
spirituality: Поиск духовных ответов не там, где нужно, уход от практики к иллюзиям.
advice: Проявите осознанность и внимательность к своим фантазиям, определитесь с реальными
  целями.
warning: Не позволяйте иллюзиям затмить реальность и помешать принятию важных решений.
