light_meaning: Завершение эмоциональных циклов, внутренний покой и равновесие в семье.
shadow_meaning: Излишняя зависимость от эмоций других людей, потеря контроля над собственными
  чувствами.
love: Углубление эмоциональной близости с партнёром, укрепление семейных уз.
career: Стабильность и гармония на рабочем месте, умение находить баланс между работой
  и личной жизнью.
money: Эмоциональная привязанность к деньгам, риск потерять контроль над финансами.
health: Глубокая эмоциональная связь с близкими, поддержка семьи в трудные моменты.
spirituality: Поиск гармонии через семейные ценности и традиции.
advice: Окружите себя людьми, которые поддерживают вас эмоционально, но не подавляют
  вашу индивидуальность.
warning: Не позволяйте эмоциям затмевать здравый смысл и рациональность.
symbols:
- Символ спокойного озера
- Якорь как символ стабильности
- Карта десяти лучей солнца, символизирующая завершение цикла
visual_markers:
  color: Тёплый зелёный оттенок
  element: Вода (Кубки)
  number: '10'
jung:
  persona: Открытая и тёплая личность, стремящаяся к гармоничному общению.
  shadow: Склонность избегать конфликтов и неудобных ситуаций из-за страха потери
    эмоционального комфорта.
  anima_animus: Поддержка и понимание со стороны противоположного пола укрепляет внутренние
    границы.
  self: Целостная личность, находящая гармонию внутри семьи.
