light_meaning: Укрепление дружеских связей и празднование радостных моментов.
shadow_meaning: Излишняя зависимость от чужого мнения и поверхностность в отношениях.
love: Углубляет эмоциональную связь с партнером через совместные увлечения и общие
  цели.
career: Поддерживает командный дух и сотрудничество в рабочей среде.
money: Способствует гармоничному распределению ресурсов и удовольствиям.
health: Призывает к заботе о своем физическом и эмоциональном состоянии.
spirituality: Напоминает об искренности чувств и важности человеческих контактов.
advice: Цените время, проведенное с близкими, и делитесь радостью друг с другом.
warning: Будьте осторожны с излишней зависимостью от одобрения окружающих.
symbols:
- Три чаши, наполненные фруктами и цветами, символизируют изобилие и радость.
- Фон из звездного неба подчеркивает космическую природу эмоций.
- Лунар, управляющая звезда Кубков, изображена над сценой.
