light_meaning: Глубокий эмоциональный опыт помогает обрести внутреннюю гармонию.
shadow_meaning: Избегание чувств приводит к эмоциональной изоляции и отчужденности.
love: Время отпустить старые привязанности и открыться новым чувствам.
career: Поиск глубокого смысла работы позволяет найти истинное призвание.
money: Инвестируйте время и энергию в развитие личных качеств, а не материальных благ.
health: Эмоциональная глубина необходима для полного физического восстановления.
spirituality: Погружение в собственные эмоции поможет раскрыть духовный потенциал.
advice: Позвольте себе почувствовать глубже, чтобы лучше понять себя и окружающий
  мир.
warning: Игнорирование своих эмоций может привести к внутреннему кризису.
symbols:
- Волны воды символизируют эмоциональную глубину и изменчивость.
- Лодка путешественника указывает на необходимость поиска внутреннего пути.
- Звездное небо отражает связь с космическими потоками и судьбой.
