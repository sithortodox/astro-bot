light_meaning: Ощущение полноты и завершенности эмоциональных потребностей.
shadow_meaning: Излишняя зависимость от эмоций может привести к пассивности и застою.
love: Гармония и удовлетворённость в отношениях, глубокое понимание партнёра.
career: Успешное завершение проекта или этапа работы, достижение цели.
money: Устойчивый доход и удовлетворение от финансовых вложений.
health: Эмоциональная стабильность и внутреннее равновесие способствуют физическому
  здоровью.
spirituality: Сильное интуитивное прозрение и духовный рост через принятие истин.
advice: Примите свои эмоции полностью, чтобы они служили вам, а не контролировали
  вас.
warning: Не позволяйте эмоциям затмевать рациональность и объективность.
symbols:
- Вода, текущая из трёх источников, символизирующая три аспекта удовлетворения.
- Три сердца разного размера, отражающие глубину и разнообразие чувств.
- Звезда внутри чаши, указывающая путь к истинному счастью.
