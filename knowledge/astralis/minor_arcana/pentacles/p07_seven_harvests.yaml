light_meaning: Успех требует терпения и вложений. Время собирать урожай усилий.
shadow_meaning: Застой из-за чрезмерной осторожности и нерешительности.
love: Влюблённость нуждается в терпении и заботе о ресурсах отношений.
career: Инвестируйте время и усилия сейчас, чтобы позже пожать плоды успеха.
money: Будьте готовы к временному затишью перед финансовым ростом.
health: Сохраняйте здоровье через регулярный уход за телом и ресурсами организма.
spirituality: Медитация и практика помогают накапливать духовную силу.
advice: Продолжайте инвестировать в себя и свои цели, даже если результаты не очевидны
  сразу.
warning: Не позволяйте страху потерь остановить вас в достижении целей.
symbols:
- Снопы пшеницы как символы урожая и стабильности.
- Земляная чаша, наполненная плодами, символизирующая изобилие.
- Изображение солнца над горизонтом, указывающее на завершение цикла.
