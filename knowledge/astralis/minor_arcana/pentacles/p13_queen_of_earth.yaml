light_meaning: Ощущение уюта и заботы, поддержка близких, стабильность и изобилие.
shadow_meaning: Излишняя привязанность к комфорту, застой, недостаток активности и
  инициативности.
love: В отношениях королева земли создает атмосферу тепла и безопасности, поддерживая
  партнера.
career: На работе проявляет заботливую внимательность, что способствует созданию уютной
  рабочей среды.
money: Финансовая стабильность и надежность обеспечиваются благодаря практичности
  и здравому смыслу.
health: Способствует физическому благополучию через заботу о здоровье и поддержание
  гармонии с телом.
spirituality: Поддерживает духовную устойчивость через связь с материальным миром
  и природой.
advice: Уделяйте время уходу за собой и окружением, создавая уют и стабильность вокруг
  себя.
warning: Не позволяйте себе впадать в инертность и застой, оставайтесь активными и
  открытыми к изменениям.
symbols:
- Цветущие растения символизируют плодородие и жизненную силу.
- Домик символизирует уют и защиту.
- Кувшин с водой олицетворяет ресурсный поток.
