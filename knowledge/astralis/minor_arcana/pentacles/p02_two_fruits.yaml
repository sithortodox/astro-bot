light_meaning: Достижение баланса через разнообразие опыта и ресурсов.
shadow_meaning: Потеря равновесия из-за чрезмерного стремления к материальным благам.
love: Символизирует гармоничные отношения, основанные на взаимопонимании и поддержке.
