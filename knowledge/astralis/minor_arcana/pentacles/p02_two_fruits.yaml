spirituality: Напоминает о необходимости внутреннего роста и самопознания.
advice: Используйте свои ресурсы с умом и находите баланс между потребностями тела
  и духа.
warning: Избегайте зацикливания на материальных ценностях и не забывайте об эмоциональной
  составляющей жизни.
symbols:
- Сноп зерновых культур как символ изобилия
