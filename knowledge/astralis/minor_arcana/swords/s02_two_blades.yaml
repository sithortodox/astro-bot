light_meaning: Две пересекающиеся линии символизируют выбор между двумя путями; нерешительность
  перед важным решением.
shadow_meaning: Перевёрнутая карта указывает на внутренний конфликт и неспособность
  принять решение, что приводит к застою.
love: В отношениях чувствуется напряжение из-за нерешительности партнёров относительно
  будущего.
career: На работе необходимо срочно сделать важный выбор, который повлияет на карьеру.
money: Финансовые решения требуют тщательного обдумывания, иначе можно потерять контроль
  над ситуацией.
health: Необходимо принять важное решение о здоровье, чтобы избежать осложнений.
spirituality: Время задуматься о духовных целях и выбрать верный путь внутреннего
  роста.
advice: Оцени свои варианты спокойно и объективно, не позволяя эмоциям взять верх.
warning: Не откладывай принятие решений слишком долго, это может привести к негативным
  последствиям.
symbols:
