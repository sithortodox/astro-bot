light_meaning: Испытание болью и предательством учит нас ценить истинных друзей.
shadow_meaning: Избегайте ситуаций, где вас могут ранить снова, чтобы не повторить
  боль прошлого.
love: Вы чувствуете глубокую печаль из-за прошлых обид и предательств.
career: Конфликты с коллегами или начальством могут вызвать стресс и разочарование.
money: Финансовые трудности связаны с неверными решениями и отсутствием контроля над
  расходами.
health: Эмоциональная боль может негативно сказаться на физическом здоровье.
spirituality: Проработайте эмоции и отпустите прошлое, чтобы освободить место для
  нового опыта.
advice: Найдите поддержку у близких людей, чтобы справиться с внутренними переживаниями.
warning: Будьте осторожны, чтобы не позволить боли управлять вами и не допустить её
  повторения.
symbols:
- Три острых шипа, пронзающих сердце
- Полумесяц под ногами, символизирующий уязвимость
- Звездный след, указывающий путь к исцелению
