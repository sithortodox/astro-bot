light_meaning: Карта символизирует свежий взгляд, ясность мысли и первый шаг к новой
  идее.
shadow_meaning: Перевернутая карта предупреждает о путанице мыслей и необходимости
  тщательного анализа перед действием.
love: В отношениях символизирует новый виток, свежие эмоции и возможность начать с
  чистого листа.
career: На работе указывает на необходимость принятия решительных мер и четкого плана
  действий.
money: Финансовые вопросы требуют продуманного подхода и внимательности к деталям.
health: Призывает обратить внимание на физическое и эмоциональное состояние, чтобы
  избежать перегрузок.
spirituality: Советует прислушаться к внутреннему голосу и найти путь к гармонии с
  собой.
advice: Используйте этот момент как стартовую точку для воплощения новых идей и решений.
warning: Не принимайте поспешных решений, тщательно обдумайте возможные последствия.
symbols:
- Изогнутая стрела, указывающая вверх, символизирует движение вперёд.
- Пламя свечи над головой отражает ясность ума и внутреннего света.
- Открытые окна означают новые возможности и перспективы.
