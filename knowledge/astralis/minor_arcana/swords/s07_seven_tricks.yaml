light_meaning: Умение находить нестандартные решения и использовать стратегию для
  достижения целей.
shadow_meaning: Склонность к манипуляции и обману ради личной выгоды, что может привести
  к утрате доверия.
love: В отношениях хитрость может помочь привлечь внимание партнера, но честность
  важнее долгосрочных связей.
career: Используйте свою стратегическое мышление для продвижения по карьерной лестнице,
  избегая интриг.
money: Манипуляция финансами требует осторожности, чтобы избежать финансовых проблем.
health: Поддерживайте открытость и искренность в общении с близкими для укрепления
  эмоционального здоровья.
spirituality: Избегайте обмана самого себя при духовном развитии, будьте искренними
  перед собой.
advice: Будьте внимательны к своим мотивам и намерениям, чтобы не стать жертвой собственной
  хитрости.
warning: Не злоупотребляйте манипуляцией, иначе потеряете доверие окружающих.
symbols:
- Семь мечей переплетены в сложную фигуру.
- Звезда с семью лучами символизирует уловки судьбы.
- Игральные карты символизируют стратегии.
