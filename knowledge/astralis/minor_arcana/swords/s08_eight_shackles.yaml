light_meaning: Осознание ограничений помогает укрепить внутренний мир и избежать чрезмерного
  риска.
shadow_meaning: Излишняя самоизоляция может привести к изоляции и отсутствию поддержки.
love: Страх быть отвергнутым укрепляет внутреннюю защиту, но мешает близости.
career: Необходимость соблюдения правил и ограничений способствует стабильности, но
  ограничивает свободу действий.
money: Финансовые ограничения стимулируют экономичность, но могут вызвать тревогу
  о недостатке средств.
health: Физическая изоляция усиливает заботу о здоровье, но лишает общения с окружающими.
spirituality: Углублённое самопознание через ограничение внешних связей открывает
  путь к внутреннему росту.
advice: Определите границы, которые укрепляют вашу безопасность, не позволяя страхам
  затмить реальность.
warning: Не позволяйте себе замыкаться в одиночестве слишком долго, иначе это приведёт
  к эмоциональной пустоте.
symbols:
- Пара узких оков, символизирующих сдерживание
- Закрытая дверь, обозначающая самоизоляцию
- Сгорбленная фигура, олицетворяющая усталость от ограничений
