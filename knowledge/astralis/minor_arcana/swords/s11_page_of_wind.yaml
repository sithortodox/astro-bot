light_meaning: Молодой искатель знаний стремится понять окружающий мир через наблюдение
  и анализ.
shadow_meaning: Неуверенность и рассеянность могут помешать объективному восприятию
  информации.
love: Влюблённость сопровождается интересом к партнёру, но требует внимательного анализа
  чувств.
career: Поиск новых возможностей и стремление к обучению помогут достичь профессионального
  роста.
money: Экономное отношение к ресурсам способствует стабильности финансового положения.
health: Активный образ жизни и регулярная физическая активность поддержат здоровье.
spirituality: Анализ собственных убеждений поможет глубже понять духовную природу.
advice: Используйте свои аналитические способности для решения сложных задач.
warning: Избегайте поспешных выводов и чрезмерного скептицизма.
symbols:
- Юноша с книгой и пером, наблюдающий за полётом птицы.
- Лёгкий ветерок, подгоняющий паруса корабля.
- Крылья и силуэт птицы, символизирующие свободу мысли.
