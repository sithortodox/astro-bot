light_meaning: Вдохновляет окружающих своей страстью и энергией, создаёт возможности
  через харизму.
shadow_meaning: Излишняя импульсивность может привести к эмоциональной нестабильности
  и поспешным решениям.
love: Активно привлекает внимание, легко завоевывает сердца благодаря обаянию и теплоте.
career: Успешна в проектах, требующих креативного подхода и лидерства.
money: Приносит прибыль через нестандартные идеи и решимость.
health: Поддерживает высокий уровень энергии и активности, но нуждается во внимании
  к отдыху.
spirituality: Гармонизирует духовный рост с практическими действиями, вдохновляя других.
advice: Используйте свою энергию и вдохновение для достижения целей, оставаясь открытыми
  к новым идеям.
warning: Не позволяйте эмоциям затмевать рациональное мышление и принимайте взвешенные
  решения.
symbols:
- Яркое пламя, символизирующее страсть и творческую силу.
- Три цветка в руках, означающие гармонию стихий и индивидуальность.
- Золотые нити, указывающие на связь с судьбой и звездами.
