light_meaning: Этот расклад предвещает расширение возможностей и ожидание значимых
  результатов.
shadow_meaning: В перевернутом положении карта указывает на задержку прогресса и отсутствие
  мотивации к действиям.
love: В отношениях карта говорит о поиске новых горизонтов и стремлении к большему
  взаимопониманию.
career: На рабочем месте ожидается рост и новые перспективы при условии активного
  участия и инициативы.
money: Финансовый аспект благоприятен, возможны инвестиции с хорошими перспективами.
health: Карта символизирует укрепление физического состояния и позитивный настрой.
spirituality: Это время для личного роста и углубления духовных практик.
advice: Используйте энергию этого момента для достижения своих целей и воплощения
  идей в жизнь.
warning: Не позволяйте себе откладывать важные решения слишком долго, иначе результаты
  могут быть разочаровывающими.
symbols:
- Три факела как символы освещения пути и направления энергии
- Огненная стихия, символизирующая волю и действие
- Горизонт как символ будущих возможностей
