light_meaning: Чувство чрезмерной ответственности может привести к выгоранию. Освободитесь
  от лишнего груза.
shadow_meaning: Игнорирование своих потребностей и обязанностей приводит к внутреннему
  напряжению и усталости.
love: Слишком большая ответственность мешает доверительным отношениям. Найдите баланс
  между заботой о партнере и собственными нуждами.
career: Взваливание на себя слишком много задач перегружает вас. Делегируйте обязанности.
money: Постоянная работа без отдыха истощает финансовые ресурсы. Учитесь планировать
  бюджет.
health: Физическое напряжение усиливается из-за переутомления. Заботьтесь о своем
  здоровье.
spirituality: Поиск внутреннего покоя требует времени и пространства для размышлений
  и медитации.
advice: Научитесь говорить «нет», чтобы сохранить энергию и ресурсность.
warning: Избегайте ситуаций, когда берете на себя больше обязательств, чем способны
  выполнить.
symbols:
- Звездообразный узор из огня символизирует поток Жезлов.
- Груда тяжелых предметов олицетворяет бремя.
- Горящий факел указывает на стремление преодолеть трудности.
