light_meaning: Это карта нового начала, чистого потенциала и невинности. Время пробуждения
  творческих сил.
shadow_meaning: Перевернутая версия указывает на утрату направления, ощущение пустоты
  и потерянность.
love: В отношениях это знак свежих чувств и зарождения новых связей.
career: На работе символизирует стартовый период, возможности для самовыражения и
  творческого роста.
money: Финансовые перспективы обещают новые начинания и потенциал для заработка.
health: Для физического состояния это сигнал о необходимости начать заботиться о себе
  заново.
spirituality: Духовно эта карта указывает на поиск смысла жизни и открытие внутреннего
  света.
advice: Используйте этот момент для воплощения своих мечт и идей в реальность.
warning: Будьте внимательны к своим чувствам и желаниям, чтобы избежать потерь.
