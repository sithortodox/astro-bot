light_meaning: Сила интуиции помогает раскрыть скрытые тайны внутреннего мира.
shadow_meaning: Перевернутая карта указывает на замутнённость восприятия и неуверенность
  в себе.
love: Влюблённым подсказывает путь к взаимопониманию через доверие своей интуиции.
career: Советует следовать внутренним ощущениям при принятии важных решений.
money: Призывает доверять своей интуиции при финансовых решениях.
health: Подчёркивает важность интуитивного понимания своих потребностей.
spirituality: Напоминает о ценности медитации и размышлений для самопознания.
advice: Следуйте своей интуиции и доверяйте своим чувствам.
warning: Избегайте поспешных выводов и чрезмерной зависимости от чужого мнения.
symbols:
- Фигура женщины, символизирующая лунный свет и тайну.
- Волны, олицетворяющие поток воды и эмоции.
- Полумесяц, указывающий на связь с подсознанием.
