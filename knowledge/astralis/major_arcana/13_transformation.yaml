light_meaning: Время глубоких изменений и перерождения. Освобождение от старого, открытие
  нового пути.
shadow_meaning: Отказ от важных аспектов себя, застой в развитии, потеря направления.
love: Личные отношения подвергаются трансформации. Возможно завершение одного этапа
  и начало другого.
career: Необходимость переосмыслить карьерный путь. Возможны значительные перемены
  в профессиональной сфере.
money: Финансовые изменения неизбежны. Важно быть готовым к неожиданностям и адаптироваться.
health: Физическое состояние требует пересмотра привычек и подхода к здоровью.
spirituality: Внутренний рост через духовную трансформацию и самопознание.
advice: Будьте открыты новым возможностям и изменениям. Используйте этот период для
  личностного роста и обновления.
warning: Избегайте сопротивления переменам. Не цепляйтесь за прошлое слишком сильно.
symbols:
- Образ звезды с разрушенной структурой, предвещающей новую форму.
- Кристалл, символизирующий очищение и просветление.
- Рука, держащая меч, указывающий на необходимость очищения.
visual_markers:
  color: Темно-синий с серебристыми акцентами
  element: Вода
  number: '13'
jung:
  persona: Проявленная личность, скрывающая внутренние изменения.
  shadow: Неосознанная теневая сторона личности, препятствующая росту.
  anima_animus: Духовное соединение противоположностей, необходимое для внутреннего
