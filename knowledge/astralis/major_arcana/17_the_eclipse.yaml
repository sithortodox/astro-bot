light_meaning: Стирание границ между сознанием и подсознанием, возможность увидеть
  скрытые аспекты себя.
shadow_meaning: Страх перед неизвестностью, подавление истинных чувств и страхов,
  потеря ориентиров.
love: Углубление эмоциональной близости через понимание друг друга на более глубоком
  уровне.
career: Необходимость пересмотреть свои приоритеты и взглянуть под другим углом на
  текущую ситуацию.
money: Осознание теневых аспектов финансового положения, поиск скрытой утечки ресурсов.
health: Поиск глубинных причин проблем со здоровьем, связанных с внутренними страхами
  и тревогами.
spirituality: Внутренний кризис веры, необходимость переосмысления духовных убеждений.
advice: Исследуйте свои внутренние страхи и иллюзии, чтобы лучше понять своё настоящее
  «я».
warning: Избегайте подавления своих эмоций и чувств, это может привести к потере направления.
symbols:
- Полумесяц, символизирующий подсознание
- Луна, затмевающая Солнце, как метафора подавленных желаний
- Тени, указывающие на скрытые страхи и иллюзии
