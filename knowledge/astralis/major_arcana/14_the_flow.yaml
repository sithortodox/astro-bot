light_meaning: Ваша жизнь течёт плавно и гармонично. Поддерживайте баланс и терпение.
shadow_meaning: Перепады настроения и нестабильность могут нарушить внутренний поток.
  Будьте внимательны к себе.
love: Вы открыты чувствам и интуитивно понимаете партнёра. Сохраняйте гармонию.
career: Успех приходит через терпеливую работу и гибкость. Не торопитесь.
money: Финансовая стабильность поддерживается умеренностью и рациональностью.
health: Физическое здоровье требует внимания и заботы. Регулярная активность важна.
spirituality: Медитация и время наедине с собой помогут сохранить духовный баланс.
advice: Доверяйте своему внутреннему ритму и следуйте за ним.
warning: Избегайте спешки и перегрузок, чтобы не потерять равновесие.
