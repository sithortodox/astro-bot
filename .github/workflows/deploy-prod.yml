name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/astro-bot 2>/dev/null || git clone https://github.com/sithortodox/astro-bot.git /opt/astro-bot
            cd /opt/astro-bot
            git pull origin main
            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" > .env
            echo "DATABASE_URL=postgresql+asyncpg://astro:astro_secret@postgres:5432/astro_bot" >> .env
            echo "REDIS_URL=redis://redis:6379/0" >> .env
            echo "OLLAMA_URL=http://ollama:11434" >> .env
            echo "OLLAMA_MODEL=gemma3:4b" >> .env
            echo "POSTGRES_USER=astro" >> .env
            echo "POSTGRES_PASSWORD=astro_secret" >> .env
            echo "POSTGRES_DB=astro_bot" >> .env
            echo "ADMIN_IDS=${{ secrets.ADMIN_IDS }}" >> .env
            docker compose down || true
            docker compose up -d --build
            sleep 15
            docker compose ps
            docker compose logs --tail=30 bot
