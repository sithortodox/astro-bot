name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/astro-bot 2>/dev/null || git clone https://github.com/sithortodox/astro-bot.git /opt/astro-bot
            cd /opt/astro-bot
            git pull origin main
            if [ ! -f .env ]; then
              cat > .env << 'ENVEOF'
BOT_TOKEN=${{ secrets.BOT_TOKEN }}
DATABASE_URL=postgresql+asyncpg://astro:astro_secret@postgres:5432/astro_bot
REDIS_URL=redis://redis:6379/0
OLLAMA_URL=http://ollama:11434
OLLAMA_MODEL=gemma3:4b
POSTGRES_USER=astro
POSTGRES_PASSWORD=astro_secret
POSTGRES_DB=astro_bot
ADMIN_IDS=${{ secrets.ADMIN_IDS }}
ENVEOF
            fi
            docker compose down || true
            docker compose up -d --build
            sleep 15
            docker compose ps
            docker compose logs --tail=30 bot
