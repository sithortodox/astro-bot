services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-astro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-astro_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-astro}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [backend]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [backend]

  migrate:
    image: astro-bot:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    restart: "no"
    networks: [backend]

  bot:
    image: astro-bot:latest
    restart: on-failure:5
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      GIGACHAT_API_KEY: ${GIGACHAT_API_KEY:-}
      GIGACHAT_URL: ${GIGACHAT_URL:-https://gigachat.devices.sberbank.ru/api/v1}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat-Lite}
      ADMIN_IDS: ${ADMIN_IDS:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./knowledge_base:/app/knowledge_base:ro
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks: [backend]

  admin_api:
    profiles: ["admin"]
    image: astro-bot:latest
    restart: on-failure:5
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BOT_TOKEN: ${BOT_TOKEN}
    ports:
      - "127.0.0.1:8000:8000"
    command: uvicorn api.admin:app --host 0.0.0.0 --port 8000
    deploy:
      resources:
        limits:
          memory: 256M
    networks: [backend]

networks:
  backend:

volumes:
  postgres_data:
  redis_data:
